services:
  temporal:
    image: temporalio/temporal:latest
    command:
      - server
      - start-dev
      - --ip
      - 0.0.0.0
      - --ui-ip
      - 0.0.0.0
    ports:
      - "7233:7233"
      - "8233:8233"
    healthcheck:
      test:
        - CMD
        - temporal
        - operator
        - cluster
        - health
        - --address
        - 127.0.0.1:7233
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  api:
    build:
      context: .
      target: api
    environment:
      TEMPORAL_HOST: temporal:7233
      TASK_QUEUE: fulfillment-queue
    ports:
      - "8000:8000"
    depends_on:
      temporal:
        condition: service_healthy

  worker:
    build:
      context: .
      target: worker
    environment:
      TEMPORAL_HOST: temporal:7233
      TASK_QUEUE: fulfillment-queue
    depends_on:
      temporal:
        condition: service_healthy
    restart: unless-stopped

  starter:
    build:
      context: .
      target: starter
    profiles:
      - demo
    environment:
      TEMPORAL_HOST: temporal:7233
      TASK_QUEUE: fulfillment-queue
    depends_on:
      temporal:
        condition: service_healthy
      worker:
        condition: service_started

  tests:
    build:
      context: .
      target: tests
    profiles:
      - test
    environment:
      TEMPORAL_HOST: temporal:7233
      TASK_QUEUE: fulfillment-queue
    depends_on:
      temporal:
        condition: service_healthy
